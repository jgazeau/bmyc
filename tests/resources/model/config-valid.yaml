---
multi_package:
  cdnjs_asset:
    local_path: path/multi_package_cdnjs_asset.min.js
    hold: false
    cdnjs:
      library: cdnjs_library
      file_path: path/cdnjs_asset.min.js
  unpkg_asset:
    local_path: path/multi_package_unpkg_asset.min.js
    hold: true
    unpkg:
      library: unpkg_library
      file_path: path/unpkg_asset.min.js
    current_version: 0.0.1
  github_asset:
    local_path: path/multi_package_github_asset.min.js
    github:
      owner: github_owner
      repository: github_repository
      file_path: path/github_asset.min.js
  jsdelivr_asset:
    local_path: path/multi_package_jsdelivr_asset.min.js
    hold: true
    jsdelivr:
      cdn: npm
      package: jsdelivr_package
      file_path: path/jsdelivr_asset.min.js
    current_version: 0.0.1
cdnjs_package:
  cdnjs_asset:
    local_path: path/cdnjs_package_cdnjs_asset.min.js
    hold: true
    cdnjs:
      library: cdnjs_library
      file_path: path/cdnjs_asset.min.js
    current_version: 0.0.1
unpkg_package:
  unpkg_asset:
    local_path: path/unpkg_package_unpkg_asset.min.js
    unpkg:
      library: unpkg_library
      file_path: path/unpkg_asset.min.js
github_package:
  github_asset:
    local_path: path/github_package_github_asset.min.js
    hold: true
    github:
      owner: github_owner
      repository: github_repository
      file_path: path/github_asset.min.js
    current_version: 0.0.1
jsdelivr_package:
  jsdelivr_asset:
    local_path: path/jsdelivr_package_jsdelivr_asset.min.js
    hold: false
    jsdelivr:
      cdn: npm
      package: jsdelivr_package
      file_path: path/jsdelivr_asset.min.js
